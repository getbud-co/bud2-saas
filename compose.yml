services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_started

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    command: ["sh", "-c", "bud2-agents-migrate && exec bud2-agents"]
    ports:
      - "8090:8090"
    env_file:
      - ./agents/.env.example
    environment:
      BUD2_API_BASE_URL: http://backend:8080
      AGENTS_DATABASE_URL: postgresql://user:password@db:5432/bud2
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8090/health/ready\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bud2
    volumes:
      # Postgres 18+ default data directory (changed from /var/lib/postgresql/data)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bud2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
