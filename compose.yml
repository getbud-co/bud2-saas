services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # frontend: rodar localmente com 'cd frontend && npm run dev' (porta 5173)
  # O Vite dev server precisa do Design System em ../../bud2-design-system
  # que não está disponível no contexto Docker.
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     target: dev
  #   ports:
  #     - "5173:5173"
  #   env_file:
  #     - ./frontend/.env
  #   depends_on:
  #     - backend

  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bud2
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bud2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
