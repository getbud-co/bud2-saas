    Permission:
      type: object
      required: [id, group, label, description]
      properties:
        id: { type: string }
        group: { type: string, enum: [people, missions, surveys, settings, assistant] }
        label: { type: string }
        description: { type: string }

    PermissionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
