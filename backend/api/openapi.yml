openapi: "3.1.0"
info:
  title: bud2 API
  version: "0.2.0"
  description: API do SaaS bud2

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health/live:
    get:
      summary: Liveness probe
      tags: [System]
      responses:
        "200":
          description: OK

  /health/ready:
    get:
      summary: Readiness probe
      tags: [System]
      responses:
        "200":
          description: OK

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token invalid, expired or revoked
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /auth/session:
    get:
      summary: Current session
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    put:
      summary: Update active organization in session
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: Updated authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /bootstrap:
    post:
      summary: Initial platform bootstrap
      tags: [Bootstrap]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapRequest"
      responses:
        "201":
          description: Bootstrap completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "409":
          description: Already bootstrapped
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /organizations:
    get:
      summary: List organizations
      tags: [Organizations]
      description: Returns all accessible organizations for the authenticated user. System admins receive all organizations.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    post:
      summary: Create organization
      tags: [Organizations]
      description: Creates a new organization. Restricted to system admins.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created
          headers:
            Location:
              schema:
                type: string
              description: URL do recurso criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /organizations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get organization
      tags: [Organizations]
      description: Returns the organization only if it is accessible to the authenticated user. Inaccessible organizations return 404. System admins may access any organization.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found or inaccessible
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    put:
      summary: Update organization
      tags: [Organizations]
      description: Updates the organization only if it is accessible to the authenticated user. Inaccessible organizations return 404. System admins may update any organization.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found or inaccessible
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Domain or workspace conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      summary: Soft delete organization
      tags: [Organizations]
      description: Soft deletes an organization and its memberships. Restricted to system admins.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /users:
    get:
      summary: List users from active organization
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      summary: Create user in active organization
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          headers:
            Location:
              schema:
                type: string
              description: URL do recurso criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found or inaccessible
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /teams:
    get:
      summary: List teams in active organization
      tags: [Teams]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [active, archived] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListResponse"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    post:
      summary: Create team in active organization
      tags: [Teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created
          headers:
            Location:
              schema:
                type: string
              description: URL do recurso criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Team name already in use
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /teams/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get team from active organization
      tags: [Teams]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    put:
      summary: Update team in active organization
      tags: [Teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Team name already in use
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Validation error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
    delete:
      summary: Soft delete team from active organization
      tags: [Teams]
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /users/{id}/membership:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get user membership in active organization
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
    put:
      summary: Update user membership in active organization
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /roles:
    get:
      summary: List roles
      tags: [Roles]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResponse"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /permissions:
    get:
      summary: List permission catalog
      tags: [Roles]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionListResponse"
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetail:
      type: object
      required: [title, status]
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }

    UpdateSessionRequest:
      type: object
      required: [organization_id]
      properties:
        organization_id: { type: string, format: uuid }

    SessionUser:
      type: object
      required: [id, first_name, last_name, email, status, is_system_admin]
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [active, inactive] }
        is_system_admin: { type: boolean }

    AccessibleOrganization:
      type: object
      required: [id, name, domain, workspace, status]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        domain: { type: string }
        workspace: { type: string }
        status: { type: string, enum: [active, inactive] }
        membership_role: { type: string, enum: [super-admin, admin-rh, gestor, colaborador, visualizador] }
        membership_status: { type: string, enum: [invited, active, inactive] }

    SessionResponse:
      type: object
      required: [user, organizations]
      properties:
        user:
          $ref: "#/components/schemas/SessionUser"
        active_organization:
          $ref: "#/components/schemas/AccessibleOrganization"
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/AccessibleOrganization"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    AuthResponse:
      allOf:
        - $ref: "#/components/schemas/SessionResponse"
        - type: object
          required: [access_token, token_type]
          properties:
            access_token: { type: string }
            refresh_token: { type: string }
            token_type: { type: string, example: Bearer }

    BootstrapRequest:
      type: object
      required:
        [organization_name, organization_domain, organization_workspace, admin_first_name, admin_last_name, admin_email, admin_password]
      properties:
        organization_name: { type: string }
        organization_domain: { type: string, format: hostname }
        organization_workspace: { type: string }
        admin_first_name: { type: string }
        admin_last_name: { type: string }
        admin_email: { type: string, format: email }
        admin_password: { type: string, minLength: 8 }

    BootstrapResponse:
      type: object
      required: [access_token, token_type, organization, admin]
      properties:
        access_token: { type: string }
        token_type: { type: string }
        organization:
          type: object
          required: [id, name, domain, workspace]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            domain: { type: string }
            workspace: { type: string }
        admin:
          type: object
          required: [id, first_name, last_name, email, is_system_admin]
          properties:
            id: { type: string, format: uuid }
            first_name: { type: string }
            last_name: { type: string }
            email: { type: string, format: email }
            is_system_admin: { type: boolean }

    Organization:
      type: object
      required: [id, name, domain, workspace, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        domain: { type: string }
        workspace: { type: string }
        status: { type: string, enum: [active, inactive] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrganizationListResponse:
      type: object
      required: [data, total, page, size]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    CreateOrganizationRequest:
      type: object
      required: [name, domain, workspace]
      properties:
        name: { type: string }
        domain: { type: string, format: hostname }
        workspace: { type: string }
        status: { type: string, enum: [active, inactive] }

    UpdateOrganizationRequest:
      type: object
      required: [name, domain, workspace, status]
      properties:
        name: { type: string }
        domain: { type: string, format: hostname }
        workspace: { type: string }
        status: { type: string, enum: [active, inactive] }

    User:
      type: object
      required: [id, first_name, last_name, email, status, is_system_admin, language, team_ids, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [active, inactive] }
        is_system_admin: { type: boolean }
        nickname: { type: string }
        job_title: { type: string }
        birth_date: { type: string, format: date }
        language: { type: string }
        gender: { type: string, enum: [feminino, masculino, nao-binario, prefiro-nao-dizer] }
        phone: { type: string }
        role: { type: string, enum: [super-admin, admin-rh, gestor, colaborador, visualizador] }
        membership_status: { type: string, enum: [invited, active, inactive] }
        team_ids:
          type: array
          items: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Membership:
      type: object
      required: [id, organization_id, user_id, role, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role: { type: string, enum: [super-admin, admin-rh, gestor, colaborador, visualizador] }
        status: { type: string, enum: [invited, active, inactive] }
        invited_by_user_id: { type: string, format: uuid }
        joined_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserListResponse:
      type: object
      required: [data, total, page, size]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    CreateUserRequest:
      type: object
      required: [first_name, last_name, email, password, role]
      properties:
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [super-admin, admin-rh, gestor, colaborador, visualizador] }
        nickname: { type: string }
        job_title: { type: string }
        birth_date: { type: string, format: date }
        language: { type: string, minLength: 2, maxLength: 10 }
        gender: { type: string, enum: [feminino, masculino, nao-binario, prefiro-nao-dizer] }
        phone: { type: string }
        team_ids:
          type: array
          items: { type: string, format: uuid }

    UpdateUserRequest:
      type: object
      required: [first_name, last_name, email, status]
      properties:
        first_name: { type: string, minLength: 1, maxLength: 100 }
        last_name: { type: string, minLength: 1, maxLength: 100 }
        email: { type: string, format: email }
        status: { type: string, enum: [active, inactive] }
        nickname: { type: string }
        job_title: { type: string }
        birth_date: { type: string, format: date }
        language: { type: string, minLength: 2, maxLength: 10 }
        gender: { type: string, enum: [feminino, masculino, nao-binario, prefiro-nao-dizer] }
        phone: { type: string }
        team_ids:
          type: array
          items: { type: string, format: uuid }

    UpdateMembershipRequest:
      type: object
      required: [role, status]
      properties:
        role: { type: string, enum: [super-admin, admin-rh, gestor, colaborador, visualizador] }
        status: { type: string, enum: [invited, active, inactive] }

    TeamMemberUser:
      type: object
      required: [id, first_name, last_name]
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        initials: { type: string }
        job_title: { type: string }
        avatar_url: { type: string }

    TeamMember:
      type: object
      required: [team_id, user_id, role_in_team, joined_at]
      properties:
        team_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role_in_team: { type: string, enum: [leader, member, observer] }
        joined_at: { type: string, format: date-time }
        user:
          $ref: "#/components/schemas/TeamMemberUser"

    Team:
      type: object
      required: [id, org_id, name, color, status, members, member_count, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        color: { type: string, enum: [neutral, orange, wine, caramel, success, warning, error] }
        status: { type: string, enum: [active, archived] }
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        member_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TeamListResponse:
      type: object
      required: [data, total, page, size]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    TeamMemberInput:
      type: object
      required: [user_id, role_in_team]
      properties:
        user_id: { type: string, format: uuid }
        role_in_team: { type: string, enum: [leader, member, observer] }

    CreateTeamRequest:
      type: object
      required: [name, color]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 500 }
        color: { type: string, enum: [neutral, orange, wine, caramel, success, warning, error] }
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMemberInput"

    UpdateTeamRequest:
      type: object
      required: [name, color, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 500 }
        color: { type: string, enum: [neutral, orange, wine, caramel, success, warning, error] }
        status: { type: string, enum: [active, archived] }
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMemberInput"

    Role:
      type: object
      required: [id, slug, name, type, scope, is_default, permission_ids, users_count, created_at, updated_at]
      properties:
